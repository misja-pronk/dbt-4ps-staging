[tools]
python = "3.13"
uv = "latest"

[env]
UV_PROJECT_ENVIRONMENT = ".venv"

# ── tasks ──────────────────────────────────────────────────────────────────
# Run with `mise run <name>` (or `mise <name>`); list them with `mise tasks`.

[tasks.generate]
description = "Regenerate the sample models in example_dbt_project from the example CDM manifest"
dir = "dbt_4ps_staging_generator"
run = """
uv run dbt-4ps-generator generate \
  --manifest ../_cdm/deltas.manifest.cdm.json \
  --output-directory ../example_dbt_project/models/staging/4ps
"""

[tasks.test]
description = "Run the generator test suite (pytest)"
alias = "t"
dir = "dbt_4ps_staging_generator"
run = "uv run pytest"

[tasks.lint]
description = "Lint the generator with ruff"
dir = "dbt_4ps_staging_generator"
run = "uv run ruff check ."

[tasks.fmt]
description = "Auto-format the generator with ruff"
alias = "format"
dir = "dbt_4ps_staging_generator"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Type-check the generator with ty"
alias = "types"
dir = "dbt_4ps_staging_generator"
run = "uv run ty check"

[tasks.check]
description = "Full pre-commit gate: lint + format check + types + tests"
dir = "dbt_4ps_staging_generator"
run = [
    "uv run ruff check .",
    "uv run ruff format --check .",
    "uv run ty check",
    "uv run pytest",
]

[tasks.build]
description = "Build the generator wheel + sdist into dist/"
dir = "dbt_4ps_staging_generator"
run = "uv build"

[tasks.docs]
description = "Preview the docs site at localhost:8000"
run = "uv run --project dbt_4ps_staging_generator --group docs mkdocs serve"

[tasks."docs:build"]
description = "Build the docs site (strict)"
run = "uv run --project dbt_4ps_staging_generator --group docs mkdocs build --strict"

[tasks."dbt:parse"]
description = "Validate the example dbt project parses (uses dummy connection env vars)"
dir = "example_dbt_project"
env = { DBT_DATABRICKS_HOST = "dummy.azuredatabricks.net", DBT_DATABRICKS_HTTP_PATH = "/sql/1.0/warehouses/dummy", DBT_DATABRICKS_CATALOG = "dummy", DBT_DATABRICKS_TOKEN = "dummy" }
run = [
    "uv run dbt deps --profiles-dir .",
    "uv run dbt parse --profiles-dir .",
]
