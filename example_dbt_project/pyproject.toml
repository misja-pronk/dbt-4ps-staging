[project]
name = "dbt-4ps-example"
version = "0.1.0"
description = "Example dbt project wiring 4PS staging models generated by dbt-4ps-generator"
requires-python = ">=3.13"
dependencies = [
    "databricks-sdk>=0.47.0",
    "dbt-core>=1.9.4",
    "dbt-databricks>=1.10.0",
    "pyyaml>=6.0.2",
]

[dependency-groups]
dev = [
    "shandy-sqlfmt[jinjafmt]>=0.26.0",
]
